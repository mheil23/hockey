<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏒 Hockey</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary-bg: #1a1a2e;
      --secondary-bg: #16213e;
      --accent-border: #0f3460;
      --text-color: #f0f0f0;
      --rink-surface: #5c6b7a;
      --own-token: #4a90d9;
      --opp-token: #d94a4a;
      --ball-color: #f5a623;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--primary-bg);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Toolbar Header */
    .toolbar {
      background-color: var(--secondary-bg);
      border-bottom: 1px solid var(--accent-border);
      padding: 0.75rem 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
    }

    .toolbar-title {
      font-size: 1.25rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .toolbar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .menu-toggle {
      display: none;
      font-size: 1.5rem;
      background: none;
      border: 1px solid var(--accent-border);
      border-radius: 4px;
      color: var(--text-color);
      cursor: pointer;
      padding: 0.3rem 0.6rem;
      min-height: 44px;
      min-width: 44px;
    }

    .toolbar-controls {
      display: contents;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .toolbar label {
      font-size: 0.8rem;
      opacity: 0.8;
      white-space: nowrap;
    }

    .toolbar select,
    .toolbar button {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--accent-border);
      border-radius: 4px;
      background-color: var(--primary-bg);
      color: var(--text-color);
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
    }

    .toolbar select:focus,
    .toolbar button:focus {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
    }

    .toolbar button.active {
      background-color: var(--accent-border);
      border-color: #4a90d9;
    }

    .toolbar .toggle-btn {
      position: relative;
    }

    .toolbar .toggle-btn[aria-pressed="true"] {
      background-color: var(--accent-border);
      border-color: #4a90d9;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .rink-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      min-width: 0;
      overflow: hidden;
    }

    #rink {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      object-fit: contain;
    }

    /* Description Panel (Desktop - Side) */
    .description-panel {
      width: 300px;
      background-color: var(--secondary-bg);
      border-left: 1px solid var(--accent-border);
      padding: 1.25rem;
      overflow-y: auto;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }

    .description-panel.visible {
      display: flex;
    }

    .description-panel h2 {
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }

    .description-panel p {
      font-size: 0.9rem;
      line-height: 1.5;
      opacity: 0.9;
    }

    .description-panel .attributes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .description-panel .attribute-tag {
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      background-color: var(--accent-border);
      border-radius: 3px;
    }

    .description-panel .close-btn {
      align-self: flex-end;
      background: none;
      border: none;
      color: var(--text-color);
      font-size: 1.25rem;
      cursor: pointer;
      padding: 0.25rem;
      min-height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Notification Area */
    .notification-area {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    .notification {
      margin-top: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 4px;
      font-size: 0.9rem;
      pointer-events: auto;
      animation: slideDown 0.3s ease;
      max-width: 90%;
    }

    .notification.info {
      background-color: #1e3a5f;
      border: 1px solid #4a90d9;
    }

    .notification.error {
      background-color: #5f1e1e;
      border: 1px solid #d94a4a;
    }

    .notification.warning {
      background-color: #5f4a1e;
      border: 1px solid #f5a623;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Confirmation Dialog */
    .confirm-dialog {
      background-color: var(--secondary-bg);
      border: 1px solid var(--accent-border);
      border-radius: 8px;
      padding: 1.5rem;
      color: var(--text-color);
      max-width: 400px;
      width: 90%;
    }

    .confirm-dialog::backdrop {
      background-color: rgba(0, 0, 0, 0.6);
    }

    .confirm-dialog p {
      margin-bottom: 1.25rem;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .confirm-dialog .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }

    .confirm-dialog button {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--accent-border);
      min-height: 44px;
      min-width: 44px;
    }

    .confirm-dialog .btn-cancel {
      background-color: var(--primary-bg);
      color: var(--text-color);
    }

    .confirm-dialog .btn-confirm {
      background-color: #d94a4a;
      color: #fff;
      border-color: #d94a4a;
    }

    /* Mobile Responsive */
    @media (max-width: 767px) {
      .toolbar {
        flex-direction: column;
        align-items: stretch;
        padding: 0.5rem 0.75rem;
        gap: 0;
      }

      .toolbar-header {
        padding-bottom: 0;
      }

      .menu-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .toolbar-controls {
        display: none;
        flex-direction: column;
        gap: 0.5rem;
        padding-top: 0.5rem;
      }

      .toolbar-controls.open {
        display: flex;
      }

      .toolbar-group {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .toolbar select,
      .toolbar button {
        min-height: 44px;
        min-width: 44px;
        font-size: 0.9rem;
        padding: 0.5rem 0.75rem;
      }

      .main-content {
        flex-direction: column;
        overflow: visible;
      }

      .rink-container {
        padding: 0.5rem;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      #rink {
        width: auto;
        height: calc(100vh - 60px);
        max-width: 100%;
        max-height: calc(100vh - 60px);
      }

      /* Description Panel as Bottom Sheet on Mobile */
      .description-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        max-height: 50vh;
        border-left: none;
        border-top: 1px solid var(--accent-border);
        border-radius: 12px 12px 0 0;
        z-index: 500;
        padding: 1rem;
      }

      .description-panel .close-btn {
        min-height: 44px;
        min-width: 44px;
      }
    }
  </style>
</head>
<body>
  <!-- Toolbar Header -->
  <header class="toolbar" role="toolbar" aria-label="Formation controls">
    <div class="toolbar-header">
      <span class="toolbar-title">🏒 Hockey</span>
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">☰</button>
    </div>

    <div class="toolbar-controls" id="toolbar-controls">
      <!-- Opponent Overlay -->
      <div class="toolbar-group">
        <button id="opponent-toggle" class="toggle-btn" type="button" aria-pressed="false" aria-label="Toggle opponent overlay">Opponent</button>
      </div>

      <!-- Moments -->
      <div class="toolbar-group">
        <label for="moment-select">Moment:</label>
        <select id="moment-select" aria-label="Situational moment">
          <option value="">— Select Moment —</option>
        </select>
        <button id="moment-save-btn" type="button" aria-label="Save current arrangement as moment" style="display:none">Save</button>
        <button id="moment-delete-btn" type="button" aria-label="Delete selected saved moment" style="display:none">Delete</button>
      </div>

      <!-- Draw Mode -->
      <div class="toolbar-group">
        <button id="draw-mode-toggle" class="toggle-btn" type="button" aria-pressed="false" aria-label="Toggle draw mode">Draw</button>
        <button id="clear-arrows-btn" type="button" aria-label="Clear all arrows" style="display:none">Clear Arrows</button>
      </div>

      <!-- Reset and Export -->
      <div class="toolbar-group">
        <button id="reset-btn" type="button" aria-label="Reset rink to default positions">Reset</button>
        <button id="export-btn" type="button" aria-label="Export rink as PNG image">Export PNG</button>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="main-content">
    <!-- Rink Container -->
    <div class="rink-container">
      <svg id="rink" viewBox="0 0 200 85" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ball hockey rink with player formations">
        <!-- Layered groups for rendering -->
        <g id="rink-markings"></g>
        <g id="arrows-layer"></g>
        <g id="tokens-layer"></g>
        <g id="ball-layer"></g>
      </svg>
    </div>

    <!-- Description Panel (side panel on desktop, bottom sheet on mobile) -->
    <aside class="description-panel" id="description-panel" aria-label="Position description" role="complementary">
      <button class="close-btn" id="description-close-btn" aria-label="Close description panel">&times;</button>
      <h2 id="description-title"></h2>
      <p id="description-role"></p>
      <div class="attributes" id="description-attributes"></div>
      <p id="description-responsibilities"></p>
    </aside>
  </main>

  <!-- Notification Area -->
  <div class="notification-area" id="notification-area" aria-live="polite" aria-atomic="true"></div>

  <!-- Confirmation Dialog -->
  <dialog class="confirm-dialog" id="confirm-dialog">
    <p id="confirm-dialog-message"></p>
    <div class="dialog-actions">
      <button class="btn-cancel" id="confirm-dialog-cancel" type="button">Cancel</button>
      <button class="btn-confirm" id="confirm-dialog-confirm" type="button">Confirm</button>
    </div>
  </dialog>

  <!-- Menu toggle for mobile -->
  <script>
    document.getElementById("menu-toggle").addEventListener("click", function() {
      const controls = document.getElementById("toolbar-controls");
      const expanded = controls.classList.toggle("open");
      this.setAttribute("aria-expanded", String(expanded));
      this.textContent = expanded ? "✕" : "☰";
    });

    // On mobile, switch SVG to portrait viewBox for correct touch handling
    function setupMobileRink() {
      const rink = document.getElementById("rink");
      if (!rink) return;
      const mq = window.matchMedia("(max-width: 767px)");
      function update(e) {
        if (e.matches) {
          // Portrait: swap viewBox to 85 wide x 200 tall, add a transform to rotate content
          rink.setAttribute("viewBox", "0 0 85 200");
          // Add a rotation group that maps the 200x85 content into the 85x200 viewport
          let rotGroup = rink.querySelector("#mobile-rotate-group");
          if (!rotGroup) {
            rotGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            rotGroup.id = "mobile-rotate-group";
            rotGroup.setAttribute("transform", "translate(85, 0) rotate(90)");
            // Move all existing children into the rotation group
            while (rink.firstChild) {
              rotGroup.appendChild(rink.firstChild);
            }
            rink.appendChild(rotGroup);
          }
        } else {
          // Desktop: restore landscape viewBox
          rink.setAttribute("viewBox", "0 0 200 85");
          const rotGroup = rink.querySelector("#mobile-rotate-group");
          if (rotGroup) {
            // Move children back out
            while (rotGroup.firstChild) {
              rink.appendChild(rotGroup.firstChild);
            }
            rotGroup.remove();
          }
        }
      }
      mq.addEventListener("change", update);
      update(mq);
    }
    setupMobileRink();
  </script>

  <!-- ES Module Entry Point -->
  <script type="module" src="src/controller.js"></script>
</body>
</html>
